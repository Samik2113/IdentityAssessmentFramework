name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ENV_RG: rg-iam-dev
  ENV_LOCATION: centralindia
  ENV_PLAN: plan-iam-dev
  ENV_API_APP: iam-api-dev-eg586yn2603
  ENV_WEB_APP: iam-web-dev-eg586yn2603
  ENV_SQL_SERVER: iamsqldeveg586yn2603
  ENV_SQL_DB: iamdb-dev

jobs:
  build_test_publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [IamMaturityStudio.Api, IamMaturityStudio.Web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        working-directory: IamMaturityStudio
        run: dotnet restore

      - name: Build
        working-directory: IamMaturityStudio
        run: dotnet build --configuration Release

      - name: Test
        working-directory: IamMaturityStudio
        run: dotnet test --configuration Release --no-build

      - name: Publish
        working-directory: IamMaturityStudio
        run: dotnet publish ./${{ matrix.project }}/${{ matrix.project }}.csproj -c Release -o ${{ runner.temp }}/${{ matrix.project }}_publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-artifact
          path: ${{ runner.temp }}/${{ matrix.project }}_publish

  deploy_api:
    runs-on: ubuntu-latest
    needs: build_test_publish
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: IamMaturityStudio.Api-artifact
          path: ${{ runner.temp }}/api

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.ENV_API_APP }}
          package: ${{ runner.temp }}/api

      - name: Setup .NET 8 for migrations
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore for migrations
        working-directory: IamMaturityStudio
        run: dotnet restore

      - name: Validate SQL server and database exist
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            az sql server show --name "$ENV_SQL_SERVER" --resource-group "$ENV_RG" --output none
            az sql db show --name "$ENV_SQL_DB" --resource-group "$ENV_RG" --server "$ENV_SQL_SERVER" --output none

      - name: Allow GitHub runner IP in SQL firewall
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            RUNNER_IP=$(curl -fsS https://api.ipify.org)
            RULE_NAME="GitHubActions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            az sql server firewall-rule create \
              --resource-group "$ENV_RG" \
              --server "$ENV_SQL_SERVER" \
              --name "$RULE_NAME" \
              --start-ip-address "$RUNNER_IP" \
              --end-ip-address "$RUNNER_IP" \
              --output none
            echo "SQL_FIREWALL_RULE_NAME=$RULE_NAME" >> "$GITHUB_ENV"

      - name: Apply EF migrations
        env:
          SQL_ADMIN_LOGIN: ${{ secrets.SQL_ADMIN_LOGIN }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        working-directory: IamMaturityStudio
        run: |
          dotnet ef database update \
            --project IamMaturityStudio.Infrastructure \
            --startup-project IamMaturityStudio.Api \
            --connection "Server=tcp:${ENV_SQL_SERVER}.database.windows.net,1433;Initial Catalog=${ENV_SQL_DB};Persist Security Info=False;User ID=${SQL_ADMIN_LOGIN};Password=${SQL_ADMIN_PASSWORD};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"

      - name: Remove GitHub runner IP firewall rule
        if: always()
        uses: azure/cli@v2
        with:
          inlineScript: |
            if [ -n "${SQL_FIREWALL_RULE_NAME:-}" ]; then
              az sql server firewall-rule delete \
                --resource-group "$ENV_RG" \
                --server "$ENV_SQL_SERVER" \
                --name "$SQL_FIREWALL_RULE_NAME" \
                --output none || true
            fi

      - name: Warmup ping API health/db
        run: curl -fsS "https://${{ env.ENV_API_APP }}.azurewebsites.net/health/db"

  deploy_web:
    runs-on: ubuntu-latest
    needs: build_test_publish
    environment: dev

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download WEB artifact
        uses: actions/download-artifact@v4
        with:
          name: IamMaturityStudio.Web-artifact
          path: ${{ runner.temp }}/web

      - name: Deploy WEB
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.ENV_WEB_APP }}
          package: ${{ runner.temp }}/web

      - name: Set WEB API base URL setting
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "$ENV_RG" \
              --name "$ENV_WEB_APP" \
              --settings WEB__ApiBaseUrl="https://${ENV_API_APP}.azurewebsites.net" \
              --output none